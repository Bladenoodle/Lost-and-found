<html>

<head>
  <title>Log in</title>
</head>

<body>
    <h1> Welcome to Lost and found!</h1>
  {% if session.username %}
  <p>
    You are logged in as {{ session.username }} with id: {{ session.user_id }}
  </p>
  <form action="/" method="POST">
    <input type="submit" name="new_item" value="New item"/>
    <input type="submit" name="logout" value="Log out"/>
  </form>
  {% else %}
  <form action="/" method="POST">
    <input type="submit" name="login" value="Login"/>
    <input type="submit" name="sign_up" value="Sign up"/>
  </form>
  {% endif %}
<h2> Posts </h2>
<ul>
  {%for item in items%}
  <li>
    <a href="/item/{{ item.id }}">{{ item.item_name }} ({{ item.status }})</a>
  </li>
  <p></p>
  {% endfor %}
</ul>

</body>

</html>
